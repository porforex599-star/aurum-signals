name: Banned vocabulary check

on:
  pull_request:
    paths:
      - '**/*.html'
      - 'js/**/*.js'
      - 'sql/**/*.sql'
      - 'scripts/check-banned-vocab.sh'
      - '.github/workflows/banned-vocab.yml'
  push:
    branches:
      - 'design/**'

jobs:
  banned-vocab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for banned trading vocabulary
        run: bash scripts/check-banned-vocab.sh
