<style>
html, body { height: 100%; }
body {

#toast-wrap { position: fixed; top: 14px; right: 14px; z-index: 60; display: flex; flex-direction: column; gap: 10px; width: 320px; max-width: calc(100vw - 28px); pointer-events: none; }

/* ---- Not-subscribed notification screen (wider than the basic gate card) ---- */
.nosub-card { width: 100%; max-width: 620px; background: #0a0a0b; border: 1px solid #252531; border-radius: 22px; padding: 34px 28px; text-align: center; }
.nosub-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(242, 54, 69, 0.08); border: 1px solid rgba(242, 54, 69, 0.3); color: #f5cd52; font-size: 11px; padding: 6px 12px; border-radius: 999px; margin-bottom: 18px; letter-spacing: 0.02em; }
.nosub-dot { width: 7px; height: 7px; border-radius: 999px; background: #f23645; box-shadow: 0 0 8px rgba(242, 54, 69, 0.8); animation: pulse 1.5s infinite; }
.nosub-title { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 26px; line-height: 1.3; font-weight: 700; margin: 0 0 10px; background: linear-gradient(135deg, #f5cd52, #d4af37); -webkit-background-clip: text; background-clip: text; color: transparent; }
.nosub-user { font-size: 12px; color: #6b7280; margin: 0 0 22px; }
.nosub-email { color: #9ca3af; font-weight: 500; }
.nosub-user a { color: #e7c66e; text-decoration: underline; margin-left: 8px; }
.nosub-steps { display: flex; gap: 12px; margin-bottom: 24px; text-align: left; }
.nosub-step { flex: 1; background: #13131a; border: 1px solid #8b7029; border-radius: 14px; padding: 16px 14px; position: relative; }
.nosub-step-num { position: absolute; top: -10px; left: 14px; width: 22px; height: 22px; border-radius: 999px; background: #d4af37; color: #0a0a0b; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.nosub-step-emoji { font-size: 22px; margin: 6px 0 8px; }
.nosub-step-title { font-size: 13px; font-weight: 600; color: #e8e8ed; margin: 0 0 6px; }
.nosub-step-desc { font-size: 11px; color: #9ca3af; line-height: 1.6; margin: 0; }
.nosub-cta { display: block; width: 100%; box-sizing: border-box; background: linear-gradient(135deg, #f5cd52, #d4af37); color: #0a0a0b; font-weight: 700; font-size: 15px; padding: 14px; border: none; border-radius: 12px; cursor: pointer; text-decoration: none; box-shadow: 0 0 24px rgba(212, 175, 55, 0.35); transition: box-shadow 0.2s, transform 0.2s; }
.nosub-cta:hover { box-shadow: 0 0 34px rgba(212, 175, 55, 0.55); transform: translateY(-1px); }
.nosub-teaser { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 12px; color: #8b7029; margin: 14px 0 0; }
@media (max-width: 480px) {
  .nosub-steps { flex-direction: column; }
  .nosub-title { font-size: 22px; }

<body class="text-warm font-sans antialiased">

<!-- =====================================================================
     Access gate (Option A) — runs before the room renders.
       1. Reads the aurum-crm session from this origin's localStorage.
       2. No session  -> inline login overlay (aurum-crm Supabase Auth).
       3. Has session -> POST wallet-subscriptions with the aurum-crm
          bearer; require an ACTIVE, non-expired `aurum_analysis` row.
       4. No active sub -> "subscribe first" screen linking to aurumlive.
     Fail-closed: any unexpected error keeps the room hidden.
     ===================================================================== -->
<script>
(function () {
  const AURUM_CRM_URL  = 'https://jdelizsmiwpushoeafen.supabase.co';
  // aurum-crm anon (publishable) key — public by design, mirrors aurumlive.com.
  const AURUM_CRM_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkZWxpenNtaXdwdXNob2VhZmVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjcwNjYsImV4cCI6MjA5MjUwMzA2Nn0.JEZuqZgqdou5YD7zWbV65O7IJrbM9dy79KgP3kpK97c';
  const CUSTOMERS_FN_URL = 'https://etwlurpjrqlvrxgsbhkd.supabase.co/functions/v1/wallet-subscriptions';
  const PACKAGE_URL = 'https://aurumlive.com/package';

  // Hide the whole document until the gate makes a decision (fail-closed).
  document.documentElement.style.visibility = 'hidden';
  function reveal() { document.documentElement.style.visibility = ''; }

  if (!window.supabase || !window.supabase.createClient) {
    // Auth library failed to load — do not leak the room.
    document.addEventListener('DOMContentLoaded', function () {
      showError('ไม่สามารถโหลดระบบยืนยันตัวตนได้ กรุณาลองใหม่อีกครั้ง');
    });
    return;
  }

  const sb = window.supabase.createClient(AURUM_CRM_URL, AURUM_CRM_ANON, {
    auth: { storageKey: 'sb-jdelizsmiwpushoeafen-auth-token', persistSession: true, autoRefreshToken: true }
  });
  window.__aurumSb = sb;

  async function hasActiveAnalysis(session) {
    const res = await fetch(CUSTOMERS_FN_URL, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + session.access_token }
    });
    if (!res.ok) return null;
    const body = await res.json().catch(function () { return {}; });
    const subs = body.subscriptions || [];
    // Return the matched subscription (truthy) or null — callers treat it as a gate pass.
    return subs.find(function (s) {
      return s.product_type === 'aurum_analysis'
        && s.status === 'active'
        && s.expires_at && new Date(s.expires_at) > new Date();
    }) || null;
  }

  // Render the real subscription expiry into the room banner (replaces hardcoded mock).
  function renderExpiry(expiresAt) {
    if (!expiresAt) return;
    const daysEl = document.getElementById('room-expiry-days');
    const dateEl = document.getElementById('room-expiry-date');
    const daysLeft = Math.max(0, Math.ceil((new Date(expiresAt).getTime() - Date.now()) / 86400000));
    const formattedDate = new Date(expiresAt).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
    if (daysEl) daysEl.textContent = daysLeft + ' วัน';
    if (dateEl) dateEl.textContent = '· หมดอายุ ' + formattedDate;
  }

  async function runGate() {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { showLoginOverlay(); return; }

      const sub = await hasActiveAnalysis(session);
      if (!sub) { showNoSubscriptionScreen(session.user && session.user.email); return; }

      // Passed — show the real expiry, reveal the room, watch for mid-session expiry.
      renderExpiry(sub.expires_at);
      reveal();
      window.__AURUM_GATE_PASSED = true;
      setInterval(recheck, 5 * 60 * 1000);
    } catch (e) {
      showError('ไม่สามารถตรวจสอบสิทธิ์การใช้งานได้ กรุณาลองใหม่อีกครั้ง');
    }
  }

  // Re-check every 5 min; soft-kick if the subscription has lapsed.
  async function recheck() {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { showNoSubscriptionScreen(); return; }
      const sub = await hasActiveAnalysis(session);
      if (!sub) { showNoSubscriptionScreen(session.user && session.user.email); return; }
      renderExpiry(sub.expires_at);
    } catch (e) { /* transient — keep current state, try again next tick */ }
  }

  function gateShell(inner) {
    return '<div class="gate-wrap"><div class="gate-card">'
      + '<div class="gate-logo">'
      + '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4.09 12.97L11 14L9 22L20 9.43L13.04 9L13 2Z"/></svg>'
      + '<span>AURUM ANALYSIS</span></div>'
      + inner + '</div></div>';
  }

  function showError(msg) {
    document.body.innerHTML = gateShell(
      '<h1>เกิดข้อผิดพลาด</h1>'
      + '<p>' + msg + '</p>'
      + '<button class="gate-btn" onclick="location.reload()">ลองใหม่</button>'
    );
    reveal();
  }

  function showLoginOverlay() {
    document.body.innerHTML = gateShell(
      '<h1>เข้าสู่ระบบ</h1>'
      + '<p>เข้าสู่ระบบเพื่อใช้งานห้องบทวิเคราะห์ Aurum Analysis</p>'
      + '<input id="gate-email" type="email" placeholder="อีเมล" autocomplete="email" />'
      + '<input id="gate-password" type="password" placeholder="รหัสผ่าน" autocomplete="current-password" />'
      + '<p id="gate-error" class="gate-error"></p>'
      + '<button id="gate-submit" class="gate-btn">เข้าสู่ระบบ</button>'
      + '<p class="gate-foot">ยังไม่เป็นสมาชิก? <a href="' + PACKAGE_URL + '">สมัคร Aurum Analysis</a></p>'
    );
    reveal();
    const submit = document.getElementById('gate-submit');
    const err = document.getElementById('gate-error');
    async function doLogin() {
      const email = document.getElementById('gate-email').value.trim();
      const password = document.getElementById('gate-password').value;
      if (!email || !password) { err.textContent = 'กรุณากรอกอีเมลและรหัสผ่าน'; return; }
      submit.disabled = true; submit.textContent = 'กำลังเข้าสู่ระบบ...'; err.textContent = '';
      const { error } = await sb.auth.signInWithPassword({ email: email, password: password });
      if (error) {
        err.textContent = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
        submit.disabled = false; submit.textContent = 'เข้าสู่ระบบ';
        return;
      }
      location.reload();
    }
    submit.addEventListener('click', doLogin);
    document.getElementById('gate-password').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLogin();
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  async function gateLogout(e) {
    if (e) e.preventDefault();
    await sb.auth.signOut();
    location.reload();
  }

  function showNoSubscriptionScreen(userEmail) {
    const userLine = userEmail
      ? '<p class="nosub-user">เข้าสู่ระบบในชื่อ: '
          + '<span class="nosub-email">' + escapeHtml(userEmail) + '</span>'
          + '<a href="#" id="nosub-logout">ออกจากระบบ</a></p>'
      : '';

    const steps =
      '<div class="nosub-steps">'
      + '<div class="nosub-step"><div class="nosub-step-num">1</div>'
        + '<div class="nosub-step-emoji">💰</div>'
        + '<p class="nosub-step-title">Subscribe</p>'
        + '<p class="nosub-step-desc">เลือกแพ็คเกจที่ aurumlive.com/package<br>$20/สัปดาห์ หรือ $60/เดือน</p></div>'
      + '<div class="nosub-step"><div class="nosub-step-num">2</div>'
        + '<div class="nosub-step-emoji">✅</div>'
        + '<p class="nosub-step-title">Auto-Activate</p>'
        + '<p class="nosub-step-desc">ระบบเปิดสิทธิ์ทันทีหลังชำระเงิน<br>ไม่ต้องรอ admin อนุมัติ</p></div>'
      + '<div class="nosub-step"><div class="nosub-step-num">3</div>'
        + '<div class="nosub-step-emoji">📊</div>'
        + '<p class="nosub-step-title">Access Room</p>'
        + '<p class="nosub-step-desc">เข้าห้องบทวิเคราะห์แบบเรียลไทม์<br>พร้อมแจ้งเตือนทันที</p></div>'
      + '</div>';

    document.body.innerHTML =
      '<div class="gate-wrap"><div class="nosub-card">'
      + '<div class="gate-logo">'
        + '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4.09 12.97L11 14L9 22L20 9.43L13.04 9L13 2Z"/></svg>'
        + '<span>AURUM ANALYSIS</span></div>'
      + '<div class="nosub-badge"><span class="nosub-dot"></span>🔒 ยังไม่ได้สมัครสมาชิก · Subscription Required</div>'
      + '<h1 class="nosub-title">ยังไม่ได้สมัครแพ็คเกจ Aurum Analysis</h1>'
      + userLine
      + steps
      + '<a href="' + PACKAGE_URL + '" class="nosub-cta">ไปสมัครสมาชิก · Subscribe Now →</a>'
      + '<p class="nosub-teaser">✨ ใช้งานได้ทันทีหลังชำระเงิน · Instant access after subscription</p>'
      + '<p class="gate-foot"><a href="#" id="gate-switch">เข้าสู่ระบบด้วยบัญชีอื่น</a></p>'
      + '</div></div>';
    reveal();

    const logout = document.getElementById('nosub-logout');
    if (logout) logout.addEventListener('click', gateLogout);
    const sw = document.getElementById('gate-switch');
    if (sw) sw.addEventListener('click', gateLogout);
  }

  // Wait for the full body to parse (so the room markup exists if we pass)
  // before deciding — avoids racing the feed/render script below.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runGate);
  } else {
    runGate();
  }
})();

// Captured per updateChart so a chip click can re-filter + re-set markers

/* =====================================================================
   Task 1.2 — Supply/Demand zone overlay.
   Lightweight Charts v4 has no native rectangle, so this is a Series Primitive
   attached to candleSeries. Each zone is a full-width horizontal band spanning
   its price range (bottom ↔ top), drawn UNDER the candles (zOrder 'bottom').
     supply → red   fill rgba(239,68,68,0.15)  border rgba(239,68,68,0.4)
     demand → green fill rgba(34,197,94,0.15)   border rgba(34,197,94,0.4)
   A mitigated zone (price already closed through it) fades + gets a dashed
   border, matching the design doc's "fade, keep visible" decision (D3).
   The DB shape is {tf, low, high, type, mitigated}; we read high/low (with a
   top/bottom alias for safety). ===================================================================== */
function makeSDZonesPrimitive() {
  let zones = [];
  let series = null;
  let requestUpdate = null;

  const ZONE_STYLE = {
    supply: { fill: 'rgba(239, 68, 68, 0.15)', border: 'rgba(239, 68, 68, 0.4)' },
    demand: { fill: 'rgba(34, 197, 94, 0.15)', border: 'rgba(34, 197, 94, 0.4)' },
  };

  const renderer = {
    draw(target) {
      if (!series || !zones.length) return;
      target.useBitmapCoordinateSpace(scope => {
        const ctx = scope.context;
        const vr = scope.verticalPixelRatio;
        const w = scope.bitmapSize.width;
        zones.forEach(z => {
          const style = ZONE_STYLE[z.type] || ZONE_STYLE.demand;
          const yA = series.priceToCoordinate(z.high);
          const yB = series.priceToCoordinate(z.low);
          if (yA == null || yB == null) return;
          const top = Math.min(yA, yB) * vr;
          const height = Math.abs(yB - yA) * vr;
          if (height <= 0) return;
          ctx.save();
          // Mitigated zones fade out but stay on the chart for context (D3).
          ctx.globalAlpha = z.mitigated ? 0.4 : 1;
          ctx.fillStyle = style.fill;
          ctx.fillRect(0, top, w, height);
          ctx.strokeStyle = style.border;
          ctx.lineWidth = Math.max(1, vr);
          if (z.mitigated) ctx.setLineDash([Math.max(2, 4 * vr), Math.max(2, 4 * vr)]);
          ctx.strokeRect(0, top, w, height);
          ctx.restore();
        });
      });
    },
  };

  const paneView = { renderer() { return renderer; }, zOrder() { return 'bottom'; } };

  return {
    attached(param) { series = param.series; requestUpdate = param.requestUpdate; },
    detached() { series = null; requestUpdate = null; },
    updateAllViews() {},
    paneViews() { return [paneView]; },
    // Extend the price scale so zones sitting above/below the candle range stay
    // visible (TradingView shows S&D zones in context, not clipped off-screen).
    autoscaleInfo() {
      if (!zones.length) return null;
      let minValue = Infinity, maxValue = -Infinity;
      zones.forEach(z => {
        minValue = Math.min(minValue, z.low, z.high);
        maxValue = Math.max(maxValue, z.low, z.high);
      });
      if (!Number.isFinite(minValue) || !Number.isFinite(maxValue)) return null;
      return { priceRange: { minValue, maxValue } };
    },
    setZones(next) {
      // Normalise DB rows → {type, high, low, mitigated}, drop unusable entries.
      zones = (next || []).map(z => ({
        type: z.type === 'supply' ? 'supply' : 'demand',
        high: +(z.high != null ? z.high : z.top),
        low:  +(z.low  != null ? z.low  : z.bottom),
        mitigated: !!z.mitigated,
      })).filter(z => Number.isFinite(z.high) && Number.isFinite(z.low));
      if (requestUpdate) requestUpdate();
    },
  };
}

function buildPatternToggles() {

function refreshPatternChip(btn, d) {

/* Merge the existing direction marker with the (toggle-filtered) pattern
   markers into ONE setMarkers call. setMarkers REPLACES the whole array
   (design doc §4), so everything that must show has to be set together, and
   the merged array MUST be sorted ascending by time. Reads markerCtx captured
   by updateChart, so a chip toggle re-renders instantly without recompute. */
function renderMarkers() {
  if (!candleSeries || !markerCtx) return;
  const pats = markerCtx.patternMarkers.filter(m =>
    m.kind.indexOf('3ls') === 0 ? patternOn['3ls'] : patternOn.engulf);
  const merged = (markerCtx.directionMarker ? [markerCtx.directionMarker] : [])
    .concat(pats)
    .sort((a, b) => a.time - b.time);
  candleSeries.setMarkers(merged);
}

function refreshEmaBtn(btn) {
  if (!btn) return;
  btn.textContent = (emaOn ? '✓ ' : '') + 'แสดง EMA9';
  btn.classList.toggle('bg-goldBg', emaOn);
  btn.classList.toggle('text-gold', emaOn);
  btn.classList.toggle('border-goldDim', emaOn);
  btn.classList.toggle('text-warmDim', !emaOn);
  btn.classList.toggle('border-line', !emaOn);
}

function computeEMA(data, period) {
  const k = 2 / (period + 1);
  let ema = null;
  return data.map(c => { ema = ema === null ? c.close : c.close * k + ema * (1 - k); return { time: c.time, value: ema }; });
}

/* SMMA (Wilder's smoothed MA) — Pine V.1 lines 4–41:
     seed = SMA(close, period) at bar `period-1`, then
     smma = (smma_prev*(period-1) + close) / period.
   Emits points only from bar `period-1` onward (earlier bars have no value),
   so a 200-period line needs ≥200 candles to start. `data` is closed candles
   only — the mock feed contains no forming bar; the Phase 3 real feed must pass
   closed candles here to honor the non-repaint contract. */
function computeSMMA(data, period) {
  const out = [];
  let smma = null, sum = 0;
  for (let i = 0; i < data.length; i++) {
    const close = data[i].close;
    if (i < period - 1) { sum += close; continue; }
    if (smma === null) { sum += close; smma = sum / period; }      // seed = SMA(period)
    else { smma = (smma * (period - 1) + close) / period; }        // Wilder recurrence
    out.push({ time: data[i].time, value: smma });
  }
  return out;
}

/* F11 — Bull UP / Bear Down label (Pine V.1 lines 635–641): compares the last
   CLOSED candle's close against SMMA200 at that bar. Rendered as a DOM badge,
   not a chart marker. Hidden until there is enough history for SMMA200. */
function updateTrendLabel(data, smma200) {
  const el = document.getElementById('trend-label');
  if (!el) return;
  if (!data.length || !smma200 || !smma200.length) { el.innerHTML = ''; return; }
  const bull = data[data.length - 1].close > smma200[smma200.length - 1].value;
  el.innerHTML = bull
    ? `<span class="inline-flex items-center gap-1 text-[11px] font-semibold px-2.5 py-1 rounded-lg border bg-okBg text-ok border-ok/50 shadow-lg shadow-black/40">▲ Bull UP</span>`
    : `<span class="inline-flex items-center gap-1 text-[11px] font-semibold px-2.5 py-1 rounded-lg border bg-bearBg text-bear border-bear/50 shadow-lg shadow-black/40">Bear Down ▼</span>`;
}

function addPriceLine(price, color, style, width, title) {
  priceLines.push(candleSeries.createPriceLine({ price, color, lineWidth: width, lineStyle: style, axisLabelVisible: true, title }));
}
function clearOverlays() {
  priceLines.forEach(l => candleSeries.removePriceLine(l));
  priceLines = [];
  candleSeries.setMarkers([]);
}

/* Map analysis_posts.candles[] (live V.2 shape: {time, open, high, low, close};
   `time` is already UNIX seconds) into the Lightweight Charts series shape.
   Defensive about an alternate `timestamp_utc` field just in case. */
function realCandlesFor(p) {
  if (!Array.isArray(p.candles) || !p.candles.length) return null;
  const out = p.candles.map(c => ({
    time: typeof c.time === 'number'
      ? c.time
      : Math.floor(new Date(c.timestamp_utc).getTime() / 1000),
    open: +c.open, high: +c.high, low: +c.low, close: +c.close,
  })).filter(c => Number.isFinite(c.time) && Number.isFinite(c.close));
  out.sort((a, b) => a.time - b.time);
  return out.length ? out : null;
}

function showChartEmpty(empty) {
  const container = document.getElementById('chart-container');
  const placeholder = document.getElementById('chart-empty');
  if (container) container.classList.toggle('hidden', empty);
  if (placeholder) { placeholder.classList.toggle('hidden', !empty); placeholder.classList.toggle('flex', empty); }
  if (empty) {
    const tl = document.getElementById('trend-label');
    if (tl) tl.innerHTML = '';
  }
}

/* Short marker label per Gold Panel pattern kind (matches the client preview's
   3s-Bull/3s-Bear text; engulfing/pin get compact labels). */
function patternLabel(kind) {
  switch (kind) {
    case '3ls_bull': return '3s-Bull';
    case '3ls_bear': return '3s-Bear';
    case 'engulf_bull':
    case 'engulf_bear': return 'Engulf';
    case 'pin_bar': return 'Pin';
    default: return kind || '';
  }
}

/* Task 1.3 — map analysis_posts.pattern_markers (live shape {kind, time, price})
   into Lightweight Charts markers. Direction comes from the kind's bull/bear
   suffix (the DB has no separate direction field). Returns null when the post
   carries no server markers, so the caller can fall back to the client preview.
   Marker times are snapped to the nearest candle time so they land on a bar. */
function serverPatternMarkers(p, data) {
  if (!Array.isArray(p.pattern_markers) || !p.pattern_markers.length) return null;
  if (!data || !data.length) return [];
  const times = data.map(c => c.time);
  function snap(t) {
    if (times.indexOf(t) !== -1) return t;
    let best = times[0], bd = Math.abs(times[0] - t);
    for (let i = 1; i < times.length; i++) {
      const d = Math.abs(times[i] - t);
      if (d < bd) { bd = d; best = times[i]; }
    }
    return best;
  }
  return p.pattern_markers.map(m => {
    const kind = m.kind || m.type || '';
    const bull = /bull/i.test(kind) || m.direction === 'bullish' || m.side === 'bull';
    const t = typeof m.time === 'number'
      ? m.time
      : Math.floor(new Date(m.timestamp_utc).getTime() / 1000);
    if (!Number.isFinite(t)) return null;
    return {
      kind: kind || (bull ? 'bull' : 'bear'),
      time: snap(t),
      position: bull ? 'belowBar' : 'aboveBar',
      color: bull ? '#22c55e' : '#ef4444',
      shape: bull ? 'arrowUp' : 'arrowDown',
      text: patternLabel(kind),
      size: 2,
    };
  }).filter(Boolean);
}

function updateChart(p) {
  if (!chart || typeof LightweightCharts === 'undefined') return;

  // Task 1.1 — real candles from analysis_posts take precedence over the mock feed.
  const real = realCandlesFor(p);

  // A post sourced from analysis_posts but carrying no candles → hide the chart
  // and show "รอข้อมูลแท่งเทียน" (Task 1.1 fallback).
  if (p.isReal && !real) { showChartEmpty(true); markerCtx = null; return; }
  showChartEmpty(false);

  let data, markerIdx;
  if (real) {
    // Real candles are used as-is — no anchoring/delta. The marker candle is the
    // most recent (last closed) bar.
    data = real;
    markerIdx = data.length - 1;
  } else {
    if (!window.MOCK_CANDLES) return;
    const raw = window.MOCK_CANDLES[p.symbol] || window.MOCK_CANDLES.XAUUSD;
    if (!raw || !raw.length) return;
    const stepMin = (window.MOCK_CANDLES_META && window.MOCK_CANDLES_META.stepMin) || 15;

    // Anchor the walk so the marker candle sits at the analysis' current price —
    // keeps จุดสำคัญ / โซนเป้าหมาย / ความเสี่ยง lines inside the visible range.
    markerIdx = Math.max(0, raw.length - 1 - Math.round((p.minsAgo || 0) / stepMin));
    const delta = p.currentPrice - raw[markerIdx].close;
    data = raw.map(c => ({ time: c.time, open: c.open + delta, high: c.high + delta, low: c.low + delta, close: c.close + delta }));
  }

  const fmt = PRICE_FMT[p.symbol] || PRICE_FMT.XAUUSD;
  candleSeries.applyOptions({ priceFormat: { type: 'price', precision: fmt.precision, minMove: fmt.minMove } });
  candleSeries.setData(data);
  ema9Series.setData(emaOn ? computeEMA(data, 9) : []);
  ema9Series.applyOptions({ visible: emaOn });

  // SMMA 21/50/100/200 (F1–F4). Data is always set; toggling controls visibility
  // only, so a chip click shows/hides instantly without needing a reselect.
  let smma200Data = null;
  SMMA_DEFS.forEach(d => {
    const s = smmaSeries[d.period];
    if (!s) return;
    const series = computeSMMA(data, d.period);
    if (d.period === 200) smma200Data = series;
    s.setData(series);
    s.applyOptions({ visible: smmaOn[d.period] });
  });
  updateTrendLabel(data, smma200Data);

  clearOverlays();
  addPriceLine(p.keyLevel, '#d4af37', LightweightCharts.LineStyle.Dashed, 2, 'จุดสำคัญ ' + fmtLevel(p.symbol, p.keyLevel));
  p.targetZones.forEach((z, i) => addPriceLine(z.level, '#d4af37', LightweightCharts.LineStyle.Solid, 1, 'Z' + (i + 1) + (z.hit ? ' ✓' : '')));
  addPriceLine(p.riskLevel, '#ef4444', LightweightCharts.LineStyle.Dashed, 2, 'ความเสี่ยง ' + fmtLevel(p.symbol, p.riskLevel));

  // Task 1.2 — supply/demand zone bands (real V.2 posts only; samples carry none).
  if (sdZonesPrimitive) sdZonesPrimitive.setZones(p.sd_zones || []);

  // Existing analysis direction marker (ขาขึ้น/ขาลง) at the anchor candle.
  const directionMarker = {
    time: data[markerIdx].time,
    position: p.view === 'bullish' ? 'belowBar' : 'aboveBar',
    color: p.view === 'bullish' ? '#22c55e' : '#ef4444',
    shape: p.view === 'bullish' ? 'arrowUp' : 'arrowDown',
    text: p.view === 'bullish' ? 'ขาขึ้น' : 'ขาลง',
  };
  // Task 1.3 / D1 Hybrid — server-delivered pattern_markers are authoritative
  // and OVERWRITE the client-detected preview when present. Demo samples (no
  // server markers) keep using the client detectPatterns() preview.
  const serverMarkers = serverPatternMarkers(p, data);
  const patternMarkers = serverMarkers !== null
    ? serverMarkers
    : (typeof detectPatterns === 'function' ? detectPatterns(data) : []);
  markerCtx = { directionMarker, patternMarkers };
  renderMarkers();

  chart.timeScale().fitContent();
}

/* Format an ISO timestamp as Bangkok (Asia/Bangkok) local time for the caption. */
function fmtBangkok(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleString('th-TH', {
      timeZone: 'Asia/Bangkok', year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  } catch (e) { return ''; }
}

let chartModalOpen = false;
function openChartModal(p) {
  if (!hasChartImage(p)) return;
  const modal   = document.getElementById('chart-modal');
  const img     = document.getElementById('chart-modal-img');
  const spinner = document.getElementById('chart-modal-spinner');
  const errEl   = document.getElementById('chart-modal-error');
  const caption = document.getElementById('chart-modal-caption');
  if (!modal) return;

  // Reset state: spinner visible, image + error hidden until load resolves.
  img.classList.add('hidden');
  errEl.classList.add('hidden');
  spinner.classList.remove('hidden');
  img.removeAttribute('src');

  img.onload = function () {
    spinner.classList.add('hidden');
    errEl.classList.add('hidden');
    img.classList.remove('hidden');
  };
  img.onerror = function () {
    spinner.classList.add('hidden');
    img.classList.add('hidden');
    errEl.classList.remove('hidden');
  };

  const when = fmtBangkok(p.chartImageGeneratedAt);
  caption.textContent = `${p.symbol} · ${p.timeframe}${when ? ' · ' + when : ''}`;
  img.src = p.chartImageUrl;

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
  chartModalOpen = true;
  // Push a history state so the browser back button closes the modal (popstate below).
  try { history.pushState({ chartModal: true }, ''); } catch (e) { /* ignore */ }
}

/* Tear down the modal UI (no history mutation — callers handle that). */
function finalizeChartClose() {
  const modal = document.getElementById('chart-modal');
  const img   = document.getElementById('chart-modal-img');
  if (!modal) return;
  modal.classList.remove('open');
  document.body.style.overflow = '';
  if (img) { img.onload = null; img.onerror = null; img.removeAttribute('src'); }
  chartModalOpen = false;
}

/* User-initiated close (×, ESC, overlay): unwind the pushed history state so the
   forward/back stack stays clean; popstate then calls finalizeChartClose. */
function closeChartModal() {
  if (!chartModalOpen) return;
  if (history.state && history.state.chartModal) { history.back(); return; }
  finalizeChartClose();
}

(function wireChartModal() {
  const modal = document.getElementById('chart-modal');
  const closeBtn = document.getElementById('chart-modal-close');
  if (!modal) return;
  // Click on the overlay itself (NOT the image/caption/close) closes.
  modal.addEventListener('click', e => { if (e.target === modal) closeChartModal(); });
  if (closeBtn) closeBtn.addEventListener('click', closeChartModal);
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && chartModalOpen) closeChartModal(); });
  // Browser back button (or our own history.back) tears the modal down.
  window.addEventListener('popstate', () => { if (chartModalOpen) finalizeChartClose(); });
})();

/* Realtime UPDATE on analysis_posts: when chart_image_url fills in (NULL → URL),
   flip the affected card's button from disabled → enabled with no page reload. */
function handleChartImageUpdate(id, url, generatedAt) {
  const p = getById(id);
  if (!p) return;
  p.chartImageUrl = url || null;
  if (generatedAt) p.chartImageGeneratedAt = generatedAt;
  if (!hasChartImage(p)) return;
  if (state.selected === id) refreshChartBtn(p);
}

/* --- sound (short chime via WebAudio; toggle persisted) --- */
let soundOn = localStorage.getItem('aurum-sound') === 'on';
let audioCtx;
function refreshSoundIcon() {
  document.getElementById('sound-on-icon').classList.toggle('hidden', !soundOn);
  document.getElementById('sound-off-icon').classList.toggle('hidden', soundOn);
}
function chime() {
  if (!soundOn) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    [[880, 0], [1320, 0.12]].forEach(([freq, t]) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = freq;
      o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.0001, now + t);
      g.gain.exponentialRampToValueAtTime(0.18, now + t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now + t + 0.4);
      o.start(now + t); o.stop(now + t + 0.42);
    });
  } catch (e) { /* audio unavailable — ignore */ }
}
document.getElementById('sound-toggle').addEventListener('click', () => {
  soundOn = !soundOn;
  localStorage.setItem('aurum-sound', soundOn ? 'on' : 'off');
  refreshSoundIcon();
  if (soundOn) chime();
});
refreshSoundIcon();

   these directly from its INSERT / UPDATE callbacks.

function handleInsert(post) {
  const p = { ...post, unread: true, isNew: true };
  POSTS.unshift(p);
  // Auto-follow same symbol in the right pane — but NEVER steal the view from a
  // live (server) post. Demo/preview inserts must not override an authoritative
  // analysis_posts row (this is what hijacked deep-linked real posts before).
  // Phase 4c — also never auto-follow at all while deep-linked, so a real
  // realtime INSERT (the future subscribeRealtime caller) can't move the chart
  // off the pinned post either; the row still lands in the list, just unselected.
  const cur = getById(state.selected);
  if (!isDeepLinked && cur && cur.symbol === p.symbol && !cur.isReal) state.selected = p.id;
  renderList();
  if (state.selected === p.id) renderDetail();
  showToast(p);
  showBrowserNotify(p);
  chime();
  setTimeout(() => { p.isNew = false; }, 3000);
}

  const p = getById(id);

  if (row) { row.classList.add('confirm-glow'); setTimeout(() => row.classList.remove('confirm-glow'), 1700); }
  if (state.selected === id) renderDetail();
}

  if (!client || !client.channel || chartImgChannel) return;
  try {
    chartImgChannel = client
      .channel('analysis_posts_chart_img')
      .on('postgres_changes',
        { event: 'UPDATE', schema: 'public', table: 'analysis_posts' },
        ({ new: row }) => {
          if (row && row.id) handleChartImageUpdate(row.id, row.chart_image_url, row.chart_image_generated_at);
        })
      .subscribe();
  } catch (e) { /* realtime unavailable — button still flips on next page load */ }
}

/* Map one analysis_posts row (live V.2 schema) into the room's post shape.
   The raw V.2 arrays (candles / pattern_markers / sd_zones) are carried through
   untouched for the chart layer (Tasks 1.1–1.3). Fields the DB does not hold
   (stats / market / volatility / title) get sensible neutral defaults. */
function mapRow(row) {
  const candles = Array.isArray(row.candles) ? row.candles : [];
  const last = candles.length ? candles[candles.length - 1] : null;
  const conf100 = typeof row.confidence === 'number' ? row.confidence : 0;
  const stars = Math.max(1, Math.min(5, Math.round(conf100 / 20) || 1));
  const tz = Array.isArray(row.target_zones) ? row.target_zones : [];
  const biasWord = row.bias === 'bullish' ? 'ขาขึ้น' : 'ขาลง';
  const minsAgo = row.timestamp_utc
    ? Math.max(0, Math.round((Date.now() - new Date(row.timestamp_utc).getTime()) / 60000))
    : 0;
  const keyLevel = typeof row.key_level === 'number' ? row.key_level : (last ? +last.close : 0);
  const riskNum = typeof row.invalidation_price === 'number' ? row.invalidation_price : keyLevel;
  const curr = last ? +last.close : keyLevel;
  let volatility = 0;
  if (candles.length) {
    const hi = Math.max.apply(null, candles.map(c => +c.high));
    const lo = Math.min.apply(null, candles.map(c => +c.low));
    if (Number.isFinite(hi) && Number.isFinite(lo)) volatility = +(hi - lo).toFixed(2);
  }
  return {
    id: row.id, symbol: row.symbol, timeframe: row.timeframe,
    minsAgo,
    view: row.bias === 'bullish' ? 'bullish' : 'bearish',
    confidence: stars,
    rewardRatio: row.rr_ratio != null ? row.rr_ratio : '—',
    keyLevel, currentPrice: curr, riskLevel: riskNum,
    riskCategory: row.risk_level || null,
    // Note: target_zones labels in the DB ("TP1"/"TP2") are deliberately NOT
    // surfaced — zoneRows() renders Z1/Z2 from the index, so only the price shows.
    targetZones: tz.map(z => ({ level: +z.price, hit: false })),
    confirmed: true,
    stats: [],
    market: { emoji: '•', th: 'ตลาด', en: 'live' },
    volatility,
    title: `${row.symbol} · มุมมอง${biasWord} · ${row.timeframe}`,
    note: row.note || '',
    // Raw V.2 payload carried through for the chart layer.
    candles,
    sd_zones: Array.isArray(row.sd_zones) ? row.sd_zones : [],
    pattern_markers: Array.isArray(row.pattern_markers) ? row.pattern_markers : [],
    // Phase 5b — chart snapshot (chart-img.com → Supabase Storage). May be NULL
    // until the backend finishes generating it; a realtime UPDATE fills it in.
    chartImageUrl: row.chart_image_url || null,
    chartImageGeneratedAt: row.chart_image_generated_at || null,
    isReal: true, unread: false, isNew: false,
  };
}

let deepLinkDone = false;
// Wrapper so the feed loader can request the ?post_id deep link without caring
// whether the handler is wired yet (the real handler lands in Task 1.4).
function runDeepLink() { if (typeof applyDeepLink === 'function') applyDeepLink(); }

async function loadRealFeed() {
  const client = getFeedClient();
  if (!client) { runDeepLink(); return; }
  subscribeChartImages(client);
  try {
    const { data, error } = await client
      .from('analysis_posts')
      .select('*')
      .order('timestamp_utc', { ascending: false })
      .limit(50);
    if (error || !Array.isArray(data) || !data.length) { runDeepLink(); return; }
    const mapped = data.map(mapRow);
    const realIds = new Set(mapped.map(p => p.id));
    // Prepend real rows; keep demo samples (no id overlap) as fallback content.
    POSTS = mapped.concat(POSTS.filter(p => !realIds.has(p.id)));
    if (!getById(state.selected)) state.selected = POSTS[0].id;
    renderList();
    renderDetail();
  } catch (e) { /* network/transient — fall back to demo samples already rendered */ }
  runDeepLink();
}

/* =====================================================================
   Task 1.4 — ?post_id deep link (e.g. opened from Telegram). On mount, if the
   URL carries a post_id that matches a loaded post, clear any filter that would
   hide it, select it as active, scroll its list row into view and highlight it.
   Runs once (deepLinkDone), invoked by runDeepLink() after the feed resolves so
   real rows are present; sample ids already in POSTS at boot also resolve.
   ===================================================================== */
function applyDeepLink() {
  if (deepLinkDone) return;
  let pid = null;
  try { pid = new URLSearchParams(location.search).get('post_id'); } catch (e) { /* ignore */ }
  if (!pid) { deepLinkDone = true; return; }
  const target = getById(pid);
  if (!target) return; // not loaded — nothing to scroll to

  deepLinkDone = true;
  // Clear filters that could hide the target row.
  state.symbol = 'all';
  const symSel = document.getElementById('f-symbol');
  if (symSel) symSel.value = 'all';
  if (state.conf > target.confidence) {
    state.conf = 0;
    document.querySelectorAll('.conf-btn').forEach(b => b.classList.remove('bg-gold', 'text-bg', 'border-gold'));
    const allBtn = document.querySelector('.conf-btn');
    if (allBtn) allBtn.classList.add('bg-gold', 'text-bg', 'border-gold');
  }

  selectPost(pid); // sets active, re-renders list + detail (and shows detail on mobile)

  // Scroll the row into view + highlight once the re-render has placed it.
  requestAnimationFrame(() => {
    const row = document.getElementById('row-' + pid);
    if (!row) return;
    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    row.classList.add('confirm-glow');
    setTimeout(() => row.classList.remove('confirm-glow'), 1700);
  });

  // Phase 5b — if the linked post already has its chart image, auto-open the modal.
  if (hasChartImage(target)) openChartModal(target);
}
