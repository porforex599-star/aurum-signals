<!-- =====================================================================
     Access gate (Option A) — runs before the room renders.
       1. Reads the aurum-crm session from this origin's localStorage.
       2. No session  -> inline login overlay (aurum-crm Supabase Auth).
       3. Has session -> POST wallet-subscriptions with the aurum-crm
          bearer; require an ACTIVE, non-expired `aurum_analysis` row.
       4. No active sub -> "subscribe first" screen linking to aurumlive.
     Fail-closed: any unexpected error keeps the room hidden.
     ===================================================================== -->
<script>
(function () {
  const AURUM_CRM_URL  = 'https://jdelizsmiwpushoeafen.supabase.co';
  // aurum-crm anon (publishable) key — public by design, mirrors aurumlive.com.
  const AURUM_CRM_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkZWxpenNtaXdwdXNob2VhZmVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjcwNjYsImV4cCI6MjA5MjUwMzA2Nn0.JEZuqZgqdou5YD7zWbV65O7IJrbM9dy79KgP3kpK97c';
  const CUSTOMERS_FN_URL = 'https://etwlurpjrqlvrxgsbhkd.supabase.co/functions/v1/wallet-subscriptions';
  const PACKAGE_URL = 'https://aurumlive.com/package';

  // Hide the whole document until the gate makes a decision (fail-closed).
  document.documentElement.style.visibility = 'hidden';
  function reveal() { document.documentElement.style.visibility = ''; }

  if (!window.supabase || !window.supabase.createClient) {
    // Auth library failed to load — do not leak the room.
    document.addEventListener('DOMContentLoaded', function () {
      showError('ไม่สามารถโหลดระบบยืนยันตัวตนได้ กรุณาลองใหม่อีกครั้ง');
    });
    return;
  }

  const sb = window.supabase.createClient(AURUM_CRM_URL, AURUM_CRM_ANON, {
    auth: { storageKey: 'sb-jdelizsmiwpushoeafen-auth-token', persistSession: true, autoRefreshToken: true }
  });
  window.__aurumSb = sb;

  async function hasActiveAnalysis(session) {
    const res = await fetch(CUSTOMERS_FN_URL, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + session.access_token }
    });
    if (!res.ok) return null;
    const body = await res.json().catch(function () { return {}; });
    const subs = body.subscriptions || [];
    // Return the matched subscription (truthy) or null — callers treat it as a gate pass.
    return subs.find(function (s) {
      return s.product_type === 'aurum_analysis'
        && s.status === 'active'
        && s.expires_at && new Date(s.expires_at) > new Date();
    }) || null;
  }

  // Render the real subscription expiry into the room banner (replaces hardcoded mock).
  function renderExpiry(expiresAt) {
    if (!expiresAt) return;
    const daysEl = document.getElementById('room-expiry-days');
    const dateEl = document.getElementById('room-expiry-date');
    const daysLeft = Math.max(0, Math.ceil((new Date(expiresAt).getTime() - Date.now()) / 86400000));
    const formattedDate = new Date(expiresAt).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
    if (daysEl) daysEl.textContent = daysLeft + ' วัน';
    if (dateEl) dateEl.textContent = '· หมดอายุ ' + formattedDate;
  }

  async function runGate() {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { showLoginOverlay(); return; }

      const sub = await hasActiveAnalysis(session);
      if (!sub) { showNoSubscriptionScreen(session.user && session.user.email); return; }

      // Passed — show the real expiry, reveal the room, watch for mid-session expiry.
      renderExpiry(sub.expires_at);
      reveal();
      window.__AURUM_GATE_PASSED = true;
      setInterval(recheck, 5 * 60 * 1000);
    } catch (e) {
      showError('ไม่สามารถตรวจสอบสิทธิ์การใช้งานได้ กรุณาลองใหม่อีกครั้ง');
    }
  }

  // Re-check every 5 min; soft-kick if the subscription has lapsed.
  async function recheck() {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { showNoSubscriptionScreen(); return; }
      const sub = await hasActiveAnalysis(session);
      if (!sub) { showNoSubscriptionScreen(session.user && session.user.email); return; }
      renderExpiry(sub.expires_at);
    } catch (e) { /* transient — keep current state, try again next tick */ }
  }

  function gateShell(inner) {
    return '<div class="gate-wrap"><div class="gate-card">'
      + '<div class="gate-logo">'
      + '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4.09 12.97L11 14L9 22L20 9.43L13.04 9L13 2Z"/></svg>'
      + '<span>AURUM ANALYSIS</span></div>'
      + inner + '</div></div>';
  }

  function showError(msg) {
    document.body.innerHTML = gateShell(
      '<h1>เกิดข้อผิดพลาด</h1>'
      + '<p>' + msg + '</p>'
      + '<button class="gate-btn" onclick="location.reload()">ลองใหม่</button>'
    );
    reveal();
  }

  function showLoginOverlay() {
    document.body.innerHTML = gateShell(
      '<h1>เข้าสู่ระบบ</h1>'
      + '<p>เข้าสู่ระบบเพื่อใช้งานห้องบทวิเคราะห์ Aurum Analysis</p>'
      + '<input id="gate-email" type="email" placeholder="อีเมล" autocomplete="email" />'
      + '<input id="gate-password" type="password" placeholder="รหัสผ่าน" autocomplete="current-password" />'
      + '<p id="gate-error" class="gate-error"></p>'
      + '<button id="gate-submit" class="gate-btn">เข้าสู่ระบบ</button>'
      + '<p class="gate-foot">ยังไม่เป็นสมาชิก? <a href="' + PACKAGE_URL + '">สมัคร Aurum Analysis</a></p>'
    );
    reveal();
    const submit = document.getElementById('gate-submit');
    const err = document.getElementById('gate-error');
    async function doLogin() {
      const email = document.getElementById('gate-email').value.trim();
      const password = document.getElementById('gate-password').value;
      if (!email || !password) { err.textContent = 'กรุณากรอกอีเมลและรหัสผ่าน'; return; }
      submit.disabled = true; submit.textContent = 'กำลังเข้าสู่ระบบ...'; err.textContent = '';
      const { error } = await sb.auth.signInWithPassword({ email: email, password: password });
      if (error) {
        err.textContent = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
        submit.disabled = false; submit.textContent = 'เข้าสู่ระบบ';
        return;
      }
      location.reload();
    }
    submit.addEventListener('click', doLogin);
    document.getElementById('gate-password').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLogin();
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  async function gateLogout(e) {
    if (e) e.preventDefault();
    await sb.auth.signOut();
    location.reload();
  }

  function showNoSubscriptionScreen(userEmail) {
    const userLine = userEmail
      ? '<p class="nosub-user">เข้าสู่ระบบในชื่อ: '
          + '<span class="nosub-email">' + escapeHtml(userEmail) + '</span>'
          + '<a href="#" id="nosub-logout">ออกจากระบบ</a></p>'
      : '';

    const steps =
      '<div class="nosub-steps">'
      + '<div class="nosub-step"><div class="nosub-step-num">1</div>'
        + '<div class="nosub-step-emoji">💰</div>'
        + '<p class="nosub-step-title">Subscribe</p>'
        + '<p class="nosub-step-desc">เลือกแพ็คเกจที่ aurumlive.com/package<br>$20/สัปดาห์ หรือ $60/เดือน</p></div>'
      + '<div class="nosub-step"><div class="nosub-step-num">2</div>'
        + '<div class="nosub-step-emoji">✅</div>'
        + '<p class="nosub-step-title">Auto-Activate</p>'
        + '<p class="nosub-step-desc">ระบบเปิดสิทธิ์ทันทีหลังชำระเงิน<br>ไม่ต้องรอ admin อนุมัติ</p></div>'
      + '<div class="nosub-step"><div class="nosub-step-num">3</div>'
        + '<div class="nosub-step-emoji">📊</div>'
        + '<p class="nosub-step-title">Access Room</p>'
        + '<p class="nosub-step-desc">เข้าห้องบทวิเคราะห์แบบเรียลไทม์<br>พร้อมแจ้งเตือนทันที</p></div>'
      + '</div>';

    document.body.innerHTML =
      '<div class="gate-wrap"><div class="nosub-card">'
      + '<div class="gate-logo">'
        + '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4.09 12.97L11 14L9 22L20 9.43L13.04 9L13 2Z"/></svg>'
        + '<span>AURUM ANALYSIS</span></div>'
      + '<div class="nosub-badge"><span class="nosub-dot"></span>🔒 ยังไม่ได้สมัครสมาชิก · Subscription Required</div>'
      + '<h1 class="nosub-title">ยังไม่ได้สมัครแพ็คเกจ Aurum Analysis</h1>'
      + userLine
      + steps
      + '<a href="' + PACKAGE_URL + '" class="nosub-cta">ไปสมัครสมาชิก · Subscribe Now →</a>'
      + '<p class="nosub-teaser">✨ ใช้งานได้ทันทีหลังชำระเงิน · Instant access after subscription</p>'
      + '<p class="gate-foot"><a href="#" id="gate-switch">เข้าสู่ระบบด้วยบัญชีอื่น</a></p>'
      + '</div></div>';
    reveal();

    const logout = document.getElementById('nosub-logout');
    if (logout) logout.addEventListener('click', gateLogout);
    const sw = document.getElementById('gate-switch');
    if (sw) sw.addEventListener('click', gateLogout);
  }

  // Wait for the full body to parse (so the room markup exists if we pass)
  // before deciding — avoids racing the feed/render script below.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runGate);
  } else {
    runGate();
  }
})();
</script>

<script>

function stars(n) { return '★'.repeat(n) + '☆'.repeat(5 - n); }

function viewTagSm(view) {
  if (view === 'bullish') {
    return `<span class="inline-flex items-center gap-0.5 text-gold text-[11px] font-semibold">
      <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14l5-5 5 5z"/></svg>ขาขึ้น</span>`;
  }
  return `<span class="inline-flex items-center gap-0.5 text-bear text-[11px] font-semibold">
    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>ขาลง</span>`;
}
function viewTagLg(view) {
  if (view === 'bullish') {
    return `<span class="inline-flex items-center gap-1 bg-goldBg text-gold text-xs font-semibold px-2.5 py-1 rounded-md border border-goldDim">
      <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14l5-5 5 5z"/></svg>มุมมองขาขึ้น</span>`;
  }
  return `<span class="inline-flex items-center gap-1 bg-bearBg text-bear text-xs font-semibold px-2.5 py-1 rounded-md border border-bear/40">
    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>มุมมองขาลง</span>`;
}

const byId = Object.fromEntries(SAMPLE_ANALYSES.map(a => [a.id, a]));
const listEl = document.getElementById('list');
const detailEl = document.getElementById('detail');
let state = { symbol: 'all', sort: 'new', conf: 0, selected: SAMPLE_ANALYSES[0].id };

function visibleList() {
  let list = SAMPLE_ANALYSES.filter(a =>
    (state.symbol === 'all' || a.symbol === state.symbol) && a.confidence >= state.conf);
  list.sort((x, y) => state.sort === 'new' ? x.minsAgo - y.minsAgo : y.minsAgo - x.minsAgo);
  return list;
}

function renderList() {
  const list = visibleList();
  listEl.innerHTML = '';
  if (!list.length) {
    listEl.innerHTML = '<p class="text-xs text-t3 text-center py-8">ไม่พบบทวิเคราะห์ตามตัวกรอง</p>';
    return;
  }
  if (!list.find(a => a.id === state.selected)) state.selected = list[0].id;
  list.forEach(a => {
    const active = a.id === state.selected;
    const el = document.createElement('button');
    el.className = 'list-item relative w-full text-left bg-surface border border-line rounded-xl p-3 flex flex-col gap-1.5' + (active ? ' active' : '');
    el.innerHTML = `
      <span class="item-bar absolute left-0 top-2 bottom-2 w-1 rounded-full bg-gold"></span>
      <div class="flex items-center justify-between">
        <span class="font-mono text-sm font-semibold text-warm">${a.symbol}</span>
        <span class="text-[10px] text-t3 font-mono">${a.timeAgo}</span>
      </div>
      <div class="flex items-center justify-between">
        ${viewTagSm(a.view)}
        <span class="text-gold text-[11px] tracking-wider">${stars(a.confidence)}</span>
      </div>`;
    el.addEventListener('click', () => { state.selected = a.id; renderList(); renderDetail(); showDetailMobile(); });
    listEl.appendChild(el);
  });
}

function loadDetailChart(a) {
  const host = document.getElementById('tv-detail');
  if (!host || typeof TradingView === 'undefined') return;
  host.innerHTML = '';
  new TradingView.widget({
    container_id: 'tv-detail',
    symbol: a.tvSymbol, interval: a.timeframe,
    timezone: 'Asia/Bangkok', theme: 'dark', style: '1', locale: 'th',
    toolbar_bg: '#131722', hide_top_toolbar: true, hide_side_toolbar: true,
    hide_legend: false, save_image: false, allow_symbol_change: false,
    details: false, autosize: true, studies: ['MAExp@tv-basicstudies'],
  });
}

function renderDetail() {
  const a = byId[state.selected];
  if (!a) { detailEl.innerHTML = ''; return; }
  detailEl.innerHTML = `
    <div class="fade-in">
      <div class="flex items-center justify-between gap-3 flex-wrap mb-3">
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-11 h-11 rounded-xl bg-gold text-bg flex items-center justify-center font-mono font-bold flex-shrink-0">${a.symbol.slice(0,3)}</div>
          <div class="min-w-0">
            <h2 class="font-mono text-xl font-semibold text-warm leading-none">${a.symbol}</h2>
            <p class="text-[11px] text-t3 mt-1">บทวิเคราะห์ · M${a.timeframe} · ${a.timeAgo}</p>
          </div>
        </div>
        ${viewTagLg(a.view)}
      </div>

      <h3 class="serif-h text-warm text-2xl sm:text-[26px] leading-tight mb-3">${a.title}</h3>

      <div class="tv-wrap mb-4" style="height: 360px;"><div id="tv-detail" style="height:100%;width:100%;"></div></div>

      <div class="grid grid-cols-3 gap-2 mb-4">
        <div class="bg-surface border border-line rounded-xl p-3 text-center">
          <p class="text-[10px] text-t3 uppercase tracking-wider mb-1">มุมมอง</p>
          <p class="text-sm font-semibold ${a.view==='bullish'?'text-gold':'text-bear'}">${a.view==='bullish'?'ขาขึ้น':'ขาลง'}</p>
        </div>
        <div class="bg-surface border border-line rounded-xl p-3 text-center">
          <p class="text-[10px] text-t3 uppercase tracking-wider mb-1">อัตราส่วน</p>
          <p class="text-sm font-mono font-semibold text-warm">${a.ratio}</p>
        </div>
        <div class="bg-surface border border-line rounded-xl p-3 text-center">
          <p class="text-[10px] text-t3 uppercase tracking-wider mb-1">ความเชื่อมั่น</p>
          <p class="text-sm text-gold tracking-wider">${stars(a.confidence)}</p>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-2 mb-4">
        <div class="bg-goldBg border border-goldDim rounded-xl p-3">
          <p class="text-[10px] text-t3 uppercase tracking-wider mb-1">จุดสำคัญ</p>
          <p class="font-mono font-semibold text-base text-gold">${a.keyLevel}</p>
        </div>
        <div class="bg-surface2 border border-line rounded-xl p-3">
          <p class="text-[10px] text-t3 uppercase tracking-wider mb-1">โซนเป้าหมาย</p>
          <p class="font-mono font-semibold text-base text-goldSoft">${a.targetZone}</p>
        </div>
        <div class="bg-surface2 border border-line rounded-xl p-3">
          <p class="text-[10px] text-t3 uppercase tracking-wider mb-1">โซนความเสี่ยง</p>
          <p class="font-mono font-semibold text-base ${a.view==='bearish'?'text-bear':'text-warmDim'}">${a.riskZone}</p>
        </div>
      </div>

      <p class="text-sm text-warmDim leading-relaxed bg-bg/40 border border-line/60 rounded-xl p-4">${a.note}</p>
    </div>`;
  loadDetailChart(a);
}

/* Filters */
document.getElementById('f-symbol').addEventListener('change', e => { state.symbol = e.target.value; renderList(); renderDetail(); });
document.getElementById('f-sort').addEventListener('change', e => { state.sort = e.target.value; renderList(); });
document.querySelectorAll('.conf-btn').forEach(btn => btn.addEventListener('click', () => {
  state.conf = Number(btn.dataset.conf);
  document.querySelectorAll('.conf-btn').forEach(b => b.classList.remove('bg-gold','text-bg','border-gold'));
  btn.classList.add('bg-gold','text-bg','border-gold');
  renderList(); renderDetail();
}));
document.querySelector('.conf-btn').classList.add('bg-gold','text-bg','border-gold');

/* Mobile tabs */
const tabList = document.getElementById('tab-list');
const tabDetail = document.getElementById('tab-detail');
const paneList = document.getElementById('pane-list');
const paneDetail = document.getElementById('pane-detail');
function activateTab(which) {
  const showList = which === 'list';
  paneList.classList.toggle('hidden', !showList);
  paneList.classList.toggle('flex', showList);
  paneDetail.classList.toggle('hidden', showList);
  paneDetail.classList.toggle('flex', !showList);
  tabList.classList.toggle('text-gold', showList);
  tabList.classList.toggle('border-gold', showList);
  tabList.classList.toggle('text-warmDim', !showList);
  tabList.classList.toggle('border-transparent', !showList);
  tabDetail.classList.toggle('text-gold', !showList);
  tabDetail.classList.toggle('border-gold', !showList);
  tabDetail.classList.toggle('text-warmDim', showList);
  tabDetail.classList.toggle('border-transparent', showList);
}
tabList.addEventListener('click', () => activateTab('list'));
tabDetail.addEventListener('click', () => activateTab('detail'));
function showDetailMobile() { if (window.matchMedia('(max-width: 767px)').matches) activateTab('detail'); }

renderList();
renderDetail();
</script>
