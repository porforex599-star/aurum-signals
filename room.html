<!-- =====================================================================
     Access gate (Option A) — runs before the room renders.
       1. Reads the aurum-crm session from this origin's localStorage.
       2. No session  -> inline login overlay (aurum-crm Supabase Auth).
       3. Has session -> POST wallet-subscriptions with the aurum-crm
          bearer; require an ACTIVE, non-expired `aurum_analysis` row.
       4. No active sub -> "subscribe first" screen linking to aurumlive.
     Fail-closed: any unexpected error keeps the room hidden.
     ===================================================================== -->
<script>
(function () {
  const AURUM_CRM_URL  = 'https://jdelizsmiwpushoeafen.supabase.co';
  // aurum-crm anon (publishable) key — public by design, mirrors aurumlive.com.
  const AURUM_CRM_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkZWxpenNtaXdwdXNob2VhZmVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjcwNjYsImV4cCI6MjA5MjUwMzA2Nn0.JEZuqZgqdou5YD7zWbV65O7IJrbM9dy79KgP3kpK97c';
  const CUSTOMERS_FN_URL = 'https://etwlurpjrqlvrxgsbhkd.supabase.co/functions/v1/wallet-subscriptions';
  const PACKAGE_URL = 'https://aurumlive.com/package';

  // Hide the whole document until the gate makes a decision (fail-closed).
  document.documentElement.style.visibility = 'hidden';
  function reveal() { document.documentElement.style.visibility = ''; }

  if (!window.supabase || !window.supabase.createClient) {
    // Auth library failed to load — do not leak the room.
    document.addEventListener('DOMContentLoaded', function () {
      showError('ไม่สามารถโหลดระบบยืนยันตัวตนได้ กรุณาลองใหม่อีกครั้ง');
    });
    return;
  }

  const sb = window.supabase.createClient(AURUM_CRM_URL, AURUM_CRM_ANON, {
    auth: { storageKey: 'sb-jdelizsmiwpushoeafen-auth-token', persistSession: true, autoRefreshToken: true }
  });
  window.__aurumSb = sb;

  async function hasActiveAnalysis(session) {
    const res = await fetch(CUSTOMERS_FN_URL, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + session.access_token }
    });
    if (!res.ok) return null;
    const body = await res.json().catch(function () { return {}; });
    const subs = body.subscriptions || [];
    // Return the matched subscription (truthy) or null — callers treat it as a gate pass.
    return subs.find(function (s) {
      return s.product_type === 'aurum_analysis'
        && s.status === 'active'
        && s.expires_at && new Date(s.expires_at) > new Date();
    }) || null;
  }

  // Render the real subscription expiry into the room banner (replaces hardcoded mock).
  function renderExpiry(expiresAt) {
    if (!expiresAt) return;
    const daysEl = document.getElementById('room-expiry-days');
    const dateEl = document.getElementById('room-expiry-date');
    const daysLeft = Math.max(0, Math.ceil((new Date(expiresAt).getTime() - Date.now()) / 86400000));
    const formattedDate = new Date(expiresAt).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
    if (daysEl) daysEl.textContent = daysLeft + ' วัน';
    if (dateEl) dateEl.textContent = '· หมดอายุ ' + formattedDate;
  }

  async function runGate() {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { showLoginOverlay(); return; }

      const sub = await hasActiveAnalysis(session);
      if (!sub) { showNoSubscriptionScreen(session.user && session.user.email); return; }

      // Passed — show the real expiry, reveal the room, watch for mid-session expiry.
      renderExpiry(sub.expires_at);
      reveal();
      window.__AURUM_GATE_PASSED = true;
      setInterval(recheck, 5 * 60 * 1000);
    } catch (e) {
      showError('ไม่สามารถตรวจสอบสิทธิ์การใช้งานได้ กรุณาลองใหม่อีกครั้ง');
    }
  }

  // Re-check every 5 min; soft-kick if the subscription has lapsed.
  async function recheck() {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { showNoSubscriptionScreen(); return; }
      const sub = await hasActiveAnalysis(session);
      if (!sub) { showNoSubscriptionScreen(session.user && session.user.email); return; }
      renderExpiry(sub.expires_at);
    } catch (e) { /* transient — keep current state, try again next tick */ }
  }

  function gateShell(inner) {
    return '<div class="gate-wrap"><div class="gate-card">'
      + '<div class="gate-logo">'
      + '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4.09 12.97L11 14L9 22L20 9.43L13.04 9L13 2Z"/></svg>'
      + '<span>AURUM ANALYSIS</span></div>'
      + inner + '</div></div>';
  }

  function showError(msg) {
    document.body.innerHTML = gateShell(
      '<h1>เกิดข้อผิดพลาด</h1>'
      + '<p>' + msg + '</p>'
      + '<button class="gate-btn" onclick="location.reload()">ลองใหม่</button>'
    );
    reveal();
  }

  function showLoginOverlay() {
    document.body.innerHTML = gateShell(
      '<h1>เข้าสู่ระบบ</h1>'
      + '<p>เข้าสู่ระบบเพื่อใช้งานห้องบทวิเคราะห์ Aurum Analysis</p>'
      + '<input id="gate-email" type="email" placeholder="อีเมล" autocomplete="email" />'
      + '<input id="gate-password" type="password" placeholder="รหัสผ่าน" autocomplete="current-password" />'
      + '<p id="gate-error" class="gate-error"></p>'
      + '<button id="gate-submit" class="gate-btn">เข้าสู่ระบบ</button>'
      + '<p class="gate-foot">ยังไม่เป็นสมาชิก? <a href="' + PACKAGE_URL + '">สมัคร Aurum Analysis</a></p>'
    );
    reveal();
    const submit = document.getElementById('gate-submit');
    const err = document.getElementById('gate-error');
    async function doLogin() {
      const email = document.getElementById('gate-email').value.trim();
      const password = document.getElementById('gate-password').value;
      if (!email || !password) { err.textContent = 'กรุณากรอกอีเมลและรหัสผ่าน'; return; }
      submit.disabled = true; submit.textContent = 'กำลังเข้าสู่ระบบ...'; err.textContent = '';
      const { error } = await sb.auth.signInWithPassword({ email: email, password: password });
      if (error) {
        err.textContent = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
        submit.disabled = false; submit.textContent = 'เข้าสู่ระบบ';
        return;
      }
      location.reload();
    }
    submit.addEventListener('click', doLogin);
    document.getElementById('gate-password').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLogin();
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  async function gateLogout(e) {
    if (e) e.preventDefault();
    await sb.auth.signOut();
    location.reload();
  }

  function showNoSubscriptionScreen(userEmail) {
    const userLine = userEmail
      ? '<p class="nosub-user">เข้าสู่ระบบในชื่อ: '
          + '<span class="nosub-email">' + escapeHtml(userEmail) + '</span>'
          + '<a href="#" id="nosub-logout">ออกจากระบบ</a></p>'
      : '';

    const steps =
      '<div class="nosub-steps">'
      + '<div class="nosub-step"><div class="nosub-step-num">1</div>'
        + '<div class="nosub-step-emoji">💰</div>'
        + '<p class="nosub-step-title">Subscribe</p>'
        + '<p class="nosub-step-desc">เลือกแพ็คเกจที่ aurumlive.com/package<br>$20/สัปดาห์ หรือ $60/เดือน</p></div>'
      + '<div class="nosub-step"><div class="nosub-step-num">2</div>'
        + '<div class="nosub-step-emoji">✅</div>'
        + '<p class="nosub-step-title">Auto-Activate</p>'
        + '<p class="nosub-step-desc">ระบบเปิดสิทธิ์ทันทีหลังชำระเงิน<br>ไม่ต้องรอ admin อนุมัติ</p></div>'
      + '<div class="nosub-step"><div class="nosub-step-num">3</div>'
        + '<div class="nosub-step-emoji">📊</div>'
        + '<p class="nosub-step-title">Access Room</p>'
        + '<p class="nosub-step-desc">เข้าห้องบทวิเคราะห์แบบเรียลไทม์<br>พร้อมแจ้งเตือนทันที</p></div>'
      + '</div>';

    document.body.innerHTML =
      '<div class="gate-wrap"><div class="nosub-card">'
      + '<div class="gate-logo">'
        + '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L4.09 12.97L11 14L9 22L20 9.43L13.04 9L13 2Z"/></svg>'
        + '<span>AURUM ANALYSIS</span></div>'
      + '<div class="nosub-badge"><span class="nosub-dot"></span>🔒 ยังไม่ได้สมัครสมาชิก · Subscription Required</div>'
      + '<h1 class="nosub-title">ยังไม่ได้สมัครแพ็คเกจ Aurum Analysis</h1>'
      + userLine
      + steps
      + '<a href="' + PACKAGE_URL + '" class="nosub-cta">ไปสมัครสมาชิก · Subscribe Now →</a>'
      + '<p class="nosub-teaser">✨ ใช้งานได้ทันทีหลังชำระเงิน · Instant access after subscription</p>'
      + '<p class="gate-foot"><a href="#" id="gate-switch">เข้าสู่ระบบด้วยบัญชีอื่น</a></p>'
      + '</div></div>';
    reveal();

    const logout = document.getElementById('nosub-logout');
    if (logout) logout.addEventListener('click', gateLogout);
    const sw = document.getElementById('gate-switch');
    if (sw) sw.addEventListener('click', gateLogout);
  }

  // Wait for the full body to parse (so the room markup exists if we pass)
  // before deciding — avoids racing the feed/render script below.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runGate);
  } else {
    runGate();
  }
})();
</script>

<script>
/* Mock data only — replace with a live Supabase feed when the backend is ready. */
const SAMPLE_ANALYSES = [
  {
    id: 'an-001', symbol: 'XAUUSD', tvSymbol: 'OANDA:XAUUSD', view: 'bullish',
    timeframe: '15', timeAgo: '2 นาทีที่แล้ว', confidence: 4, ratio: '1:1.7',

function stars(n) { return '★'.repeat(n) + '☆'.repeat(5 - n); }

function viewTag(view) {
  if (view === 'bullish') {
    return `<span class="inline-flex items-center gap-1 bg-goldBg text-gold text-xs font-semibold px-2.5 py-1 rounded-md border border-goldDim">
      <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14l5-5 5 5z"/></svg>มุมมองขาขึ้น</span>`;
  }
  return `<span class="inline-flex items-center gap-1 bg-bearBg text-bear text-xs font-semibold px-2.5 py-1 rounded-md border border-bear/40">
    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>มุมมองขาลง</span>`;
}

/* Lightweight static sparkline thumbnail (no network) — gives each card a chart
   feel without loading a TradingView widget until the reader opens the detail. */
function sparkline(view) {
  const up = view === 'bullish';
  const stroke = up ? '#d4af37' : '#f23645';
  const d = up ? 'M0 56 L40 48 L80 52 L120 34 L160 38 L200 18 L240 12'
               : 'M0 14 L40 20 L80 16 L120 34 L160 30 L200 48 L240 56';
  return `<svg viewBox="0 0 240 70" preserveAspectRatio="none" class="w-full h-full">
    <polyline points="${d.replace(/[ML]/g,' ').trim()}" fill="none" stroke="${stroke}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function metricsGrid(a) {
  return `<div class="grid grid-cols-3 gap-1.5">
    <div class="bg-surface2 rounded-lg p-2.5 border border-line/60">
      <p class="text-[10px] text-t3 uppercase tracking-wider mb-0.5">จุดสำคัญ</p>
      <p class="font-mono font-semibold text-sm text-gold">${a.keyLevel}</p></div>
    <div class="bg-surface2 rounded-lg p-2.5 border border-line/60">
      <p class="text-[10px] text-t3 uppercase tracking-wider mb-0.5">โซนเป้าหมาย</p>
      <p class="font-mono font-semibold text-sm text-goldSoft">${a.targetZone}</p></div>
    <div class="bg-surface2 rounded-lg p-2.5 border border-line/60">
      <p class="text-[10px] text-t3 uppercase tracking-wider mb-0.5">โซนความเสี่ยง</p>
      <p class="font-mono font-semibold text-sm ${a.view==='bearish'?'text-bear':'text-warmDim'}">${a.riskZone}</p></div>
  </div>`;
}

function heroHtml(a) {
  return `<article class="mag-card bg-surface border border-line rounded-3xl overflow-hidden fade-in">
    <div class="grid md:grid-cols-2">
      <div class="tv-wrap !rounded-none" style="min-height: 300px;">
        <div id="tv-${a.id}" style="height:100%;width:100%;min-height:300px;"></div>
      </div>
      <div class="p-5 sm:p-6 flex flex-col">
        <div class="flex items-center gap-2 flex-wrap mb-3">
          <span class="bg-gold text-bg text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full flex items-center gap-1.5">
            <span class="w-1.5 h-1.5 bg-bg/70 rounded-full live-dot"></span>ล่าสุด</span>
          <span class="font-mono text-xs text-warm bg-surface2 border border-line px-2.5 py-1 rounded-full">${a.symbol}</span>
          ${viewTag(a.view)}
        </div>
        <h3 class="serif-h text-warm text-2xl sm:text-[28px] leading-tight mb-2">${a.title}</h3>
        <p class="text-[13px] text-warmDim leading-relaxed mb-4">${a.note}</p>
        <div class="mb-4">${metricsGrid(a)}</div>
        <div class="mt-auto flex items-center justify-between">
          <span class="text-xs text-warmDim">ความเชื่อมั่น <span class="text-gold tracking-wider">${stars(a.confidence)}</span></span>
          <span class="text-[11px] text-t3 font-mono">${a.timeAgo} · M${a.timeframe} · อัตราส่วน ${a.ratio}</span>
        </div>
      </div>
    </div>
  </article>`;
}

function gridCardHtml(a) {
  return `<article class="mag-card cursor-pointer bg-surface border border-line rounded-2xl overflow-hidden fade-in" data-open="${a.id}">
    <div class="thumb h-28 relative border-b border-line">
      ${sparkline(a.view)}
      <span class="absolute top-2.5 left-2.5 font-mono text-[11px] text-warm bg-bg/70 border border-line px-2 py-0.5 rounded-full">${a.symbol}</span>
      <span class="absolute top-2.5 right-2.5 text-[11px] text-t3 font-mono">M${a.timeframe}</span>
    </div>
    <div class="p-4">
      <div class="flex items-center gap-2 mb-2">${viewTag(a.view)}
        <span class="ml-auto text-gold text-xs tracking-wider">${stars(a.confidence)}</span></div>
      <h3 class="serif-h text-warm text-lg leading-snug mb-1.5">${a.title}</h3>
      <p class="text-xs text-warmDim leading-relaxed line-clamp-2 mb-3">${a.note}</p>
      <div class="flex items-center justify-between">
        <span class="text-[11px] text-t3 font-mono">${a.timeAgo}</span>
        <span class="text-xs font-semibold text-gold inline-flex items-center gap-1 hover:text-goldSoft">อ่านต่อ
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></span>
      </div>
    </div>
  </article>`;
}

const byId = Object.fromEntries(SAMPLE_ANALYSES.map(a => [a.id, a]));

function loadChart(a, containerId) {
  const host = document.getElementById(containerId);
  if (!host || host.dataset.loaded || typeof TradingView === 'undefined') return;
  host.dataset.loaded = '1';
  new TradingView.widget({
    container_id: containerId,
    symbol: a.tvSymbol, interval: a.timeframe,
    timezone: 'Asia/Bangkok', theme: 'dark', style: '1', locale: 'th',
    toolbar_bg: '#131722', hide_top_toolbar: true, hide_side_toolbar: true,
    hide_legend: false, save_image: false, allow_symbol_change: false,
    details: false, autosize: true, studies: ['MAExp@tv-basicstudies'],
  });
}

const heroEl = document.getElementById('hero');
const gridEl = document.getElementById('grid');
let currentFilter = 'all';

function render() {
  const list = SAMPLE_ANALYSES.filter(a => currentFilter === 'all' || a.symbol === currentFilter);
  heroEl.innerHTML = '';
  gridEl.innerHTML = '';
  if (!list.length) {
    gridEl.innerHTML = '<p class="text-sm text-t3 col-span-full text-center py-10">ยังไม่มีบทวิเคราะห์สำหรับสินทรัพย์นี้</p>';
    return;
  }
  const [hero, ...rest] = list;
  heroEl.innerHTML = heroHtml(hero);
  rest.forEach(a => gridEl.insertAdjacentHTML('beforeend', gridCardHtml(a)));

  // Lazy-load the hero chart only when it scrolls into view.
  const target = document.getElementById('tv-' + hero.id);
  if (target) {
    const io = new IntersectionObserver((entries, obs) => {
      entries.forEach(e => { if (e.isIntersecting) { loadChart(hero, 'tv-' + hero.id); obs.disconnect(); } });
    }, { rootMargin: '120px' });
    io.observe(target);
  }
  gridEl.querySelectorAll('[data-open]').forEach(el =>
    el.addEventListener('click', () => openModal(el.dataset.open)));
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  render();
});

/* Modal — full chart + metrics, chart lazy-loaded on open */
const modal = document.getElementById('modal');
const modalBody = document.getElementById('modal-body');
function openModal(id) {
  const a = byId[id];
  modalBody.innerHTML = `
    <div class="flex items-center justify-between p-4 border-b border-line sticky top-0 bg-surface z-10">
      <div class="flex items-center gap-2 flex-wrap">
        <span class="font-mono text-xs text-warm bg-surface2 border border-line px-2.5 py-1 rounded-full">${a.symbol}</span>
        ${viewTag(a.view)}
        <span class="text-[11px] text-t3 font-mono">M${a.timeframe} · ${a.timeAgo}</span>
      </div>
      <button id="modal-close" class="w-8 h-8 rounded-lg hover:bg-line flex items-center justify-center text-warmDim">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-4 sm:p-5">
      <h3 class="serif-h text-warm text-2xl leading-tight mb-3">${a.title}</h3>
      <div class="tv-wrap mb-4" style="height: 320px;"><div id="tv-modal-${a.id}" style="height:100%;width:100%;"></div></div>
      <div class="flex items-center justify-between mb-4">
        <span class="text-xs text-warmDim">ความเชื่อมั่น <span class="text-gold tracking-wider">${stars(a.confidence)}</span></span>
        <span class="text-xs text-warmDim">อัตราส่วน <span class="font-mono text-warm">${a.ratio}</span></span>
      </div>
      ${metricsGrid(a)}
      <p class="text-[13px] text-warmDim leading-relaxed bg-bg/40 border border-line/60 rounded-xl p-3.5 mt-4">${a.note}</p>
    </div>`;
  modal.classList.remove('hidden');
  modal.classList.add('flex');
  document.body.style.overflow = 'hidden';
  document.getElementById('modal-close').addEventListener('click', closeModal);
  loadChart(a, 'tv-modal-' + a.id);
}
function closeModal() {
  modal.classList.add('hidden');
  modal.classList.remove('flex');
  modalBody.innerHTML = '';
  document.body.style.overflow = '';
}
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('flex')) closeModal(); });

render();
</script>
